<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free HTML entities encoder and decoder. Escape and unescape HTML special characters instantly.">
  <title>HTML Entities Encoder & Decoder | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">HTML Entities Encoder & Decoder</h1>
  <p class="tool-desc">Encode HTML special characters (&lt; &gt; &amp; " ') into entities, or decode them back to plain text.</p>
  <div class="card">
    <label class="label">Input</label>
    <textarea id="input" placeholder="Enter HTML or text..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="process('encode')">Encode →</button>
      <button class="btn btn-secondary" onclick="process('decode')">← Decode</button>
    </div>
    <label class="label">Output</label>
    <div class="output" id="output">Result appears here...</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">Copy</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function process(mode){
  const t=document.getElementById('input').value;
  if(mode==='encode'){document.getElementById('output').textContent=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  else{const el=document.createElement('div');el.innerHTML=t;document.getElementById('output').textContent=el.innerText||el.textContent;}
}
</script>
</body></html>
