<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free cron expression parser. Understand and validate cron job schedules in plain English.">
  <title>Cron Expression Parser – Explain Cron Jobs | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Cron Expression Parser</h1>
  <p class="tool-desc">Enter a cron expression and get a human-readable explanation of the schedule.</p>
  <div class="card">
    <label class="label">Cron Expression (5 fields: min hour day month weekday)</label>
    <input type="text" id="input" placeholder="e.g. 0 9 * * 1-5" oninput="parse()" style="font-family:'Courier New',monospace;font-size:1rem">
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="setEx('* * * * *')">Every minute</button>
      <button class="btn btn-secondary" onclick="setEx('0 * * * *')">Every hour</button>
      <button class="btn btn-secondary" onclick="setEx('0 9 * * 1-5')">Weekdays 9am</button>
      <button class="btn btn-secondary" onclick="setEx('0 0 * * 0')">Weekly Sunday</button>
      <button class="btn btn-secondary" onclick="setEx('0 0 1 * *')">Monthly</button>
    </div>
    <div class="output" id="output" style="color:var(--text);font-size:1rem;margin-top:12px">Enter a cron expression above</div>
    <div style="margin-top:16px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px" id="fields"></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function setEx(v){document.getElementById('input').value=v;parse();}
function descField(v,type){
  if(v==='*')return`every ${type}`;
  if(v.includes('/'))return`every ${v.split('/')[1]} ${type}s`;
  if(v.includes('-'))return`${type}s ${v}`;
  if(v.includes(','))return`${type}s ${v}`;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(type==='weekday'&&!isNaN(v))return days[parseInt(v)]||v;
  if(type==='month'&&!isNaN(v))return months[parseInt(v)-1]||v;
  return`${type} ${v}`;
}
function parse(){
  const parts=document.getElementById('input').value.trim().split(/\s+/);
  if(parts.length!==5){document.getElementById('output').textContent='Enter exactly 5 fields: min hour day month weekday';document.getElementById('fields').innerHTML='';return;}
  const [min,hr,day,mon,wd]=parts;
  const names=['Minute','Hour','Day','Month','Weekday'];
  document.getElementById('fields').innerHTML=parts.map((v,i)=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-family:'Courier New',monospace;font-size:1.1rem;color:var(--accent);font-weight:700">${v}</div><div style="font-size:0.72rem;color:var(--muted);margin-top:4px">${names[i]}</div></div>`).join('');
  document.getElementById('output').textContent=`Runs ${descField(min,'minute')} past ${descField(hr,'hour')}, on ${descField(day,'day')} of ${descField(mon,'month')}, ${descField(wd,'weekday')}.`;
}
</script>
</body></html>
