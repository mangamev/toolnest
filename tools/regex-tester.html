<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free online regex tester. Test and debug regular expressions with live match highlighting.">
  <title>Regex Tester – Test Regular Expressions Online | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
  <style>.match{background:#6c63ff44;border-bottom:2px solid var(--accent);border-radius:2px;}</style>
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Regex Tester</h1>
  <p class="tool-desc">Test and debug regular expressions with live match highlighting.</p>
  <div class="card">
    <label class="label">Regular Expression</label>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="color:var(--muted);font-size:1.2rem">/</span>
      <input type="text" id="pattern" placeholder="e.g. \d+" oninput="test()" style="font-family:'Courier New',monospace">
      <span style="color:var(--muted);font-size:1.2rem">/</span>
      <input type="text" id="flags" placeholder="gi" value="g" oninput="test()" style="width:60px;font-family:'Courier New',monospace">
    </div>
    <label class="label">Test String</label>
    <textarea id="input" placeholder="Enter text to test against..." oninput="test()"></textarea>
    <div class="output" id="info" style="margin-top:8px">Enter a pattern to start matching</div>
    <label class="label">Highlighted Matches</label>
    <div id="highlighted" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:48px;font-family:'Courier New',monospace;font-size:0.88rem;line-height:1.8;word-break:break-all;margin-top:0"></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function test(){
  const p=document.getElementById('pattern').value,f=document.getElementById('flags').value,t=document.getElementById('input').value;
  if(!p){document.getElementById('info').textContent='Enter a pattern';document.getElementById('highlighted').textContent=t;return;}
  try{
    const re=new RegExp(p,f);
    const matches=[...t.matchAll(new RegExp(p,f.includes('g')?f:f+'g'))];
    document.getElementById('info').textContent=`${matches.length} match${matches.length!==1?'es':''} found`;
    document.getElementById('highlighted').innerHTML=t.replace(re,m=>`<span class="match">${m}</span>`);
  }catch(e){document.getElementById('info').textContent='Invalid regex: '+e.message;document.getElementById('highlighted').textContent=t;}
}
</script>
</body></html>
