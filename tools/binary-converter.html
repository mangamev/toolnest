<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free online binary converter. Convert text to binary and binary to text instantly.">
  <title>Binary Converter – Text to Binary | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Binary Converter</h1>
  <p class="tool-desc">Convert plain text to binary (0s and 1s) or convert binary back to readable text.</p>
  <div class="card">
    <label class="label">Input</label>
    <textarea id="input" placeholder="Enter text or binary..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="process('encode')">Text → Binary</button>
      <button class="btn btn-secondary" onclick="process('decode')">Binary → Text</button>
    </div>
    <label class="label">Output</label>
    <div class="output" id="output" style="word-break:break-all">Result appears here...</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">Copy</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function process(mode){
  const t=document.getElementById('input').value;
  try{
    if(mode==='encode'){document.getElementById('output').textContent=[...t].map(c=>c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');}
    else{document.getElementById('output').textContent=t.trim().split(/\s+/).map(b=>String.fromCharCode(parseInt(b,2))).join('');}
    document.getElementById('output').style.color='var(--accent2)';
  }catch(e){document.getElementById('output').textContent='Error: invalid input';document.getElementById('output').style.color='#ff6b6b';}
}
</script>
</body></html>
