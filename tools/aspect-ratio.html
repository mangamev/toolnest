<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free aspect ratio calculator. Calculate width, height, or ratio for video, images, and screens.">
  <title>Aspect Ratio Calculator – Free Online Tool | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Aspect Ratio Calculator</h1>
  <p class="tool-desc">Calculate missing width, height, or ratio. Perfect for video, images, and screen resolutions.</p>
  <div class="card">
    <label class="label">Common Ratios</label>
    <div class="btn-row" style="margin-bottom:16px">
      <button class="btn btn-secondary" onclick="setRatio(16,9)">16:9</button>
      <button class="btn btn-secondary" onclick="setRatio(4,3)">4:3</button>
      <button class="btn btn-secondary" onclick="setRatio(1,1)">1:1</button>
      <button class="btn btn-secondary" onclick="setRatio(21,9)">21:9</button>
      <button class="btn btn-secondary" onclick="setRatio(9,16)">9:16</button>
    </div>
    <div class="row">
      <div><label class="label">Width</label><input type="number" id="w" placeholder="e.g. 1920" oninput="calcH()"></div>
      <div><label class="label">Height</label><input type="number" id="h" placeholder="e.g. 1080" oninput="calcW()"></div>
    </div>
    <div class="row">
      <div><label class="label">Ratio W</label><input type="number" id="rw" placeholder="16" oninput="calcH()"></div>
      <div><label class="label">Ratio H</label><input type="number" id="rh" placeholder="9" oninput="calcH()"></div>
    </div>
    <div class="output" id="result">Enter values above</div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function setRatio(w,h){document.getElementById('rw').value=w;document.getElementById('rh').value=h;calcH();}
function gcd(a,b){return b?gcd(b,a%b):a;}
function calcH(){
  const w=parseFloat(document.getElementById('w').value),rw=parseFloat(document.getElementById('rw').value),rh=parseFloat(document.getElementById('rh').value);
  if(w&&rw&&rh){const h=Math.round(w*rh/rw);document.getElementById('h').value=h;showResult(w,h,rw,rh);}
}
function calcW(){
  const h=parseFloat(document.getElementById('h').value),rw=parseFloat(document.getElementById('rw').value),rh=parseFloat(document.getElementById('rh').value);
  if(h&&rw&&rh){const w=Math.round(h*rw/rh);document.getElementById('w').value=w;showResult(w,h,rw,rh);}
  else{const w=parseFloat(document.getElementById('w').value);if(w&&h){const g=gcd(w,h);showResult(w,h,w/g,h/g);}}
}
function showResult(w,h,rw,rh){document.getElementById('result').textContent=`${w} × ${h} px  |  Ratio: ${rw}:${rh}`;}
setRatio(16,9);
</script>
</body></html>
