<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free Lorem Ipsum generator. Generate placeholder text by paragraphs or words for design mockups.">
  <title>Lorem Ipsum Generator – Free Placeholder Text | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Lorem Ipsum Generator</h1>
  <p class="tool-desc">Generate Lorem Ipsum placeholder text for your design mockups, wireframes, and prototypes.</p>
  <div class="card">
    <div class="row">
      <div>
        <label class="label">Type</label>
        <select id="type"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select>
      </div>
      <div>
        <label class="label">Count</label>
        <input type="number" id="count" value="3" min="1" max="100">
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-primary" onclick="generate()">Generate</button></div>
    <label class="label">Output</label>
    <div class="output" id="output" style="max-height:300px;overflow-y:auto;color:var(--text);font-family:'Inter',sans-serif;line-height:1.7">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">Copy</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
const WORDS=['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','eu','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'];
function rw(){return WORDS[Math.floor(Math.random()*WORDS.length)];}
function sentence(){const l=6+Math.floor(Math.random()*12);return Array.from({length:l},(_,i)=>i===0?rw().charAt(0).toUpperCase()+rw().slice(1):rw()).join(' ')+'.';}
function paragraph(){const l=4+Math.floor(Math.random()*4);return Array.from({length:l},()=>sentence()).join(' ');}
function generate(){
  const type=document.getElementById('type').value;
  const n=Math.min(parseInt(document.getElementById('count').value)||1,100);
  let result='';
  if(type==='paragraphs') result=Array.from({length:n},()=>paragraph()).join('\n\n');
  else if(type==='sentences') result=Array.from({length:n},()=>sentence()).join(' ');
  else result=Array.from({length:n},()=>rw()).join(' ');
  document.getElementById('output').textContent=result;
}
generate();
</script>
</body></html>
