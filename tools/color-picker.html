<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free online color picker. Convert colors between HEX, RGB, and HSL formats instantly.">
  <title>Color Picker & Converter – HEX RGB HSL | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Color Picker & Converter</h1>
  <p class="tool-desc">Pick any color and instantly get its HEX, RGB, and HSL values. Click any value to copy.</p>
  <div class="card">
    <div id="preview" style="width:100%;height:100px;border-radius:10px;background:#6c63ff;margin-bottom:16px;transition:background 0.2s"></div>
    <input type="color" id="picker" value="#6c63ff" oninput="update(this.value)">
    <div class="stat-row" style="margin-top:16px">
      <div class="stat" style="cursor:pointer" onclick="copyRaw(document.getElementById('hex').textContent)">
        <strong id="hex" style="font-size:1rem">#6C63FF</strong>HEX <span style="font-size:0.7rem;color:var(--accent)">click to copy</span>
      </div>
      <div class="stat" style="cursor:pointer" onclick="copyRaw(document.getElementById('rgb').textContent)">
        <strong id="rgb" style="font-size:0.9rem">rgb(108,99,255)</strong>RGB
      </div>
      <div class="stat" style="cursor:pointer" onclick="copyRaw(document.getElementById('hsl').textContent)">
        <strong id="hsl" style="font-size:0.9rem">hsl(244,100%,70%)</strong>HSL
      </div>
    </div>
    <label class="label" style="margin-top:16px">Enter HEX manually</label>
    <input type="text" id="hexInput" placeholder="#6c63ff" oninput="fromHex(this.value)" maxlength="7">
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function update(hex){
  document.getElementById('preview').style.background=hex;
  document.getElementById('hex').textContent=hex.toUpperCase();
  document.getElementById('hexInput').value=hex;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  document.getElementById('rgb').textContent=`rgb(${r},${g},${b})`;
  const rf=r/255,gf=g/255,bf=b/255,max=Math.max(rf,gf,bf),min=Math.min(rf,gf,bf);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case rf:h=((gf-bf)/d+(gf<bf?6:0))/6;break;case gf:h=((bf-rf)/d+2)/6;break;default:h=((rf-gf)/d+4)/6;}}
  document.getElementById('hsl').textContent=`hsl(${Math.round(h*360)},${Math.round(s*100)}%,${Math.round(l*100)}%)`;
}
function fromHex(v){if(/^#[0-9a-fA-F]{6}$/.test(v)){document.getElementById('picker').value=v;update(v);}}
update('#6c63ff');
</script>
</body></html>
