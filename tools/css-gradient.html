<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free CSS gradient generator. Create beautiful linear and radial gradients and copy the CSS code instantly.">
  <title>CSS Gradient Generator – Free Online Tool | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">CSS Gradient Generator</h1>
  <p class="tool-desc">Create beautiful CSS gradients visually and copy the code instantly.</p>
  <div class="card">
    <div id="preview" style="width:100%;height:120px;border-radius:10px;margin-bottom:16px;transition:all 0.3s"></div>
    <div class="row">
      <div><label class="label">Type</label>
        <select id="type" onchange="update()">
          <option value="linear">Linear</option>
          <option value="radial">Radial</option>
        </select>
      </div>
      <div><label class="label">Angle (linear)</label><input type="number" id="angle" value="135" oninput="update()"></div>
    </div>
    <div class="row">
      <div><label class="label">Color 1</label><input type="color" id="c1" value="#6c63ff" oninput="update()"></div>
      <div><label class="label">Color 2</label><input type="color" id="c2" value="#00d4aa" oninput="update()"></div>
      <div><label class="label">Color 3 (optional)</label><input type="color" id="c3" value="#ff6b6b" oninput="update()"></div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;cursor:pointer;margin-bottom:12px">
      <input type="checkbox" id="useC3" onchange="update()" style="width:auto;accent-color:var(--accent)"> Use 3rd color
    </label>
    <label class="label">CSS Code</label>
    <div class="output" id="output" style="font-family:'Courier New',monospace"></div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">Copy CSS</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function update(){
  const type=document.getElementById('type').value,angle=document.getElementById('angle').value;
  const c1=document.getElementById('c1').value,c2=document.getElementById('c2').value,c3=document.getElementById('c3').value;
  const use3=document.getElementById('useC3').checked;
  const colors=use3?`${c1}, ${c2}, ${c3}`:`${c1}, ${c2}`;
  const css=type==='linear'?`linear-gradient(${angle}deg, ${colors})`:`radial-gradient(circle, ${colors})`;
  document.getElementById('preview').style.background=css;
  document.getElementById('output').textContent=`background: ${css};`;
}
update();
</script>
</body></html>
