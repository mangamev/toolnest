  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free secure password generator. Create strong, random passwords with custom length and character options. No signup required.">
  <title>Password Generator – Free Strong Password Generator | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Password Generator</h1>
  <p class="tool-desc">Generate strong, cryptographically secure random passwords. Customize length and character types.</p>
  <div class="card">
    <label class="label">Password Length: <strong id="lenDisplay">16</strong></label>
    <input type="range" id="pwLen" min="4" max="128" value="16" oninput="document.getElementById('lenDisplay').textContent=this.value;generate()" style="width:100%;accent-color:var(--accent);margin-bottom:16px">
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;font-size:0.9rem">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="upper" checked style="width:auto;accent-color:var(--accent)"> Uppercase letters (A–Z)</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="lower" checked style="width:auto;accent-color:var(--accent)"> Lowercase letters (a–z)</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="nums" checked style="width:auto;accent-color:var(--accent)"> Numbers (0–9)</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="syms" checked style="width:auto;accent-color:var(--accent)"> Symbols (!@#$%^&*...)</label>
    </div>
    <div class="output" id="output" style="font-size:1.1rem;letter-spacing:1px;text-align:center">Click Generate</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generate()">Generate</button>
      <button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">Copy</button>
    </div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function generate() {
  const len = parseInt(document.getElementById('pwLen').value);
  const pool = (document.getElementById('upper').checked?'ABCDEFGHIJKLMNOPQRSTUVWXYZ':'')+(document.getElementById('lower').checked?'abcdefghijklmnopqrstuvwxyz':'')+(document.getElementById('nums').checked?'0123456789':'')+(document.getElementById('syms').checked?'!@#$%^&*()_+-=[]{}|;:,.<>?':'');
  if(!pool){document.getElementById('output').textContent='Select at least one option';return;}
  const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  document.getElementById('output').textContent=[...arr].map(n=>pool[n%pool.length]).join('');
}
generate();
</script>
