<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free Roman numeral converter. Convert numbers to Roman numerals or Roman numerals to numbers instantly.">
  <title>Roman Numeral Converter – Free Online Tool | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Roman Numeral Converter</h1>
  <p class="tool-desc">Convert Arabic numbers to Roman numerals or Roman numerals back to numbers. Supports 1–3999.</p>
  <div class="card">
    <label class="label">Number → Roman Numeral</label>
    <input type="number" id="numInput" placeholder="e.g. 2024" min="1" max="3999" oninput="toRoman()">
    <div class="output" id="romanOut" style="font-size:1.8rem;text-align:center;font-family:'Space Grotesk',sans-serif">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('romanOut').textContent)">Copy</button></div>
    <label class="label" style="margin-top:20px">Roman Numeral → Number</label>
    <input type="text" id="romanInput" placeholder="e.g. MMXXIV" oninput="fromRoman()" style="font-family:'Courier New',monospace;text-transform:uppercase">
    <div class="output" id="numOut" style="font-size:1.8rem;text-align:center;font-family:'Space Grotesk',sans-serif">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('numOut').textContent)">Copy</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
const vals=[[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
function toRoman(){let n=parseInt(document.getElementById('numInput').value);if(isNaN(n)||n<1||n>3999){document.getElementById('romanOut').textContent='1–3999 only';return;}let r='';for(const[v,s]of vals){while(n>=v){r+=s;n-=v;}}document.getElementById('romanOut').textContent=r;}
function fromRoman(){const r=document.getElementById('romanInput').value.toUpperCase();const map={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};let n=0;for(let i=0;i<r.length;i++){const cur=map[r[i]],next=map[r[i+1]];if(cur===undefined){document.getElementById('numOut').textContent='Invalid';return;}n+=next&&cur<next?-cur:cur;}document.getElementById('numOut').textContent=n||'—';}
</script>
</body></html>
