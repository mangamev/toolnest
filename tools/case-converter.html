<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free online case converter. Convert text to uppercase, lowercase, title case, sentence case, camelCase, and snake_case instantly.">
  <title>Case Converter – Free Text Case Conversion Tool | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Case Converter</h1>
  <p class="tool-desc">Convert your text to any case format instantly — uppercase, lowercase, title case, camelCase, snake_case, and more.</p>
  <div class="card">
    <label class="label">Input Text</label>
    <textarea id="input" placeholder="Enter your text here..."></textarea>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="convert('upper')">UPPER</button>
      <button class="btn btn-secondary" onclick="convert('lower')">lower</button>
      <button class="btn btn-secondary" onclick="convert('title')">Title Case</button>
      <button class="btn btn-secondary" onclick="convert('sentence')">Sentence case</button>
      <button class="btn btn-secondary" onclick="convert('camel')">camelCase</button>
      <button class="btn btn-secondary" onclick="convert('snake')">snake_case</button>
      <button class="btn btn-secondary" onclick="convert('kebab')">kebab-case</button>
      <button class="btn btn-secondary" onclick="convert('pascal')">PascalCase</button>
    </div>
    <label class="label">Result</label>
    <div class="output" id="output">Result appears here...</div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">Copy Result</button>
      <button class="btn btn-secondary" onclick="document.getElementById('input').value='';document.getElementById('output').textContent='Result appears here...'">Clear</button>
    </div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function convert(type) {
  const t = document.getElementById('input').value;
  let r = '';
  switch(type) {
    case 'upper': r = t.toUpperCase(); break;
    case 'lower': r = t.toLowerCase(); break;
    case 'title': r = t.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); break;
    case 'sentence': r = t.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g,c=>c.toUpperCase()); break;
    case 'camel': r = t.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase()); break;
    case 'snake': r = t.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''); break;
    case 'kebab': r = t.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); break;
    case 'pascal': r = t.toLowerCase().replace(/(^\w|[^a-zA-Z0-9]\w)/g,c=>c.replace(/[^a-zA-Z0-9]/g,'').toUpperCase()); break;
  }
  document.getElementById('output').textContent = r;
}
</script>
</body></html>
