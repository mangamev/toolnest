<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free online text diff checker. Compare two texts and highlight the differences instantly.">
  <title>Text Diff Checker – Compare Two Texts | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
  <style>
    .diff-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:12px;font-family:'Courier New',monospace;font-size:0.85rem;line-height:1.8;max-height:300px;overflow-y:auto;}
    .added{background:#00d4aa33;color:#00d4aa;border-radius:3px;padding:0 2px;}
    .removed{background:#ff6b6b33;color:#ff6b6b;text-decoration:line-through;border-radius:3px;padding:0 2px;}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:600px){.split{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container" style="max-width:1000px">
  <h1 class="tool-title">Text Diff Checker</h1>
  <p class="tool-desc">Compare two texts and see the differences highlighted. Great for spotting changes between versions.</p>
  <div class="card">
    <div class="split">
      <div><label class="label">Original Text</label><textarea id="a" placeholder="Original text..." style="min-height:160px"></textarea></div>
      <div><label class="label">Modified Text</label><textarea id="b" placeholder="Modified text..." style="min-height:160px"></textarea></div>
    </div>
    <div class="btn-row"><button class="btn btn-primary" onclick="diff()">Compare</button><button class="btn btn-secondary" onclick="document.getElementById('a').value='';document.getElementById('b').value='';document.getElementById('result').innerHTML=''">Clear</button></div>
    <label class="label">Differences</label>
    <div class="diff-wrap" id="result">Click Compare to see differences...</div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function diff(){
  const a=document.getElementById('a').value.split(/\s+/),b=document.getElementById('b').value.split(/\s+/);
  const bSet=new Set(b),aSet=new Set(a);
  const html=b.map(w=>aSet.has(w)?w:`<span class="added">${w}</span>`).join(' ')+'<br><br>'+
    a.map(w=>bSet.has(w)?'':'<span class="removed">'+w+'</span>').filter(Boolean).join(' ');
  document.getElementById('result').innerHTML=html||'No differences found.';
}
</script>
</body></html>
