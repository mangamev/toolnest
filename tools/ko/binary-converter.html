<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 2진수 변환기. 텍스트를 이진수로 변환하거나 이진수를 텍스트로 변환하세요.">
  <title>2진수 변환기 – 텍스트 이진수 변환 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/binary-converter.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">2진수 변환기</h1>
  <p class="tool-desc">텍스트를 이진수(0과 1)로 변환하거나, 이진수를 읽을 수 있는 텍스트로 변환합니다.</p>
  <div class="card">
    <label class="label">입력</label>
    <textarea id="input" placeholder="텍스트 또는 이진수를 입력하세요..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="process('encode')">텍스트 → 이진수</button>
      <button class="btn btn-secondary" onclick="process('decode')">이진수 → 텍스트</button>
    </div>
    <label class="label">결과</label>
    <div class="output" id="output" style="word-break:break-all">결과가 여기에 표시됩니다...</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">복사</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
function process(mode){
  const t=document.getElementById('input').value;
  try{
    if(mode==='encode'){document.getElementById('output').textContent=[...t].map(c=>c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');}
    else{document.getElementById('output').textContent=t.trim().split(/\s+/).map(b=>String.fromCharCode(parseInt(b,2))).join('');}
    document.getElementById('output').style.color='var(--accent2)';
  }catch(e){document.getElementById('output').textContent='오류: 잘못된 입력';document.getElementById('output').style.color='#ff6b6b';}
}
</script>
</body></html>
