<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 해시 생성기. SHA-1, SHA-256, SHA-512 해시값을 즉시 생성하세요.">
  <title>해시 생성기 – SHA256, SHA512 무료 온라인 도구 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/hash-generator.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">해시 생성기</h1>
  <p class="tool-desc">텍스트의 SHA-1, SHA-256, SHA-512 해시값을 생성합니다. 브라우저 내에서 처리되어 안전합니다.</p>
  <div class="card">
    <label class="label">입력 텍스트</label>
    <textarea id="input" placeholder="해시를 생성할 텍스트를 입력하세요..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="hashAll()">해시 생성</button>
      <button class="btn btn-secondary" onclick="document.getElementById('input').value='';clearHashes()">초기화</button>
    </div>
    <label class="label" style="margin-top:16px">SHA-1</label>
    <div class="output" id="sha1">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('sha1').textContent)">SHA-1 복사</button></div>
    <label class="label">SHA-256</label>
    <div class="output" id="sha256">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('sha256').textContent)">SHA-256 복사</button></div>
    <label class="label">SHA-512</label>
    <div class="output" id="sha512" style="font-size:0.75rem">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('sha512').textContent)">SHA-512 복사</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
async function digest(algo,msg){const buf=await crypto.subtle.digest(algo,new TextEncoder().encode(msg));return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');}
async function hashAll(){const t=document.getElementById('input').value;if(!t){clearHashes();return;}document.getElementById('sha1').textContent=await digest('SHA-1',t);document.getElementById('sha256').textContent=await digest('SHA-256',t);document.getElementById('sha512').textContent=await digest('SHA-512',t);}
function clearHashes(){['sha1','sha256','sha512'].forEach(id=>document.getElementById(id).textContent='—');}
</script>
</body></html>
