<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 CSS 그라디언트 생성기. 아름다운 그라디언트를 만들고 CSS 코드를 즉시 복사하세요.">
  <title>CSS 그라디언트 생성기 – 무료 온라인 도구 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/css-gradient.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">CSS 그라디언트 생성기</h1>
  <p class="tool-desc">원하는 색상으로 CSS 그라디언트를 만들고 코드를 즉시 복사하세요.</p>
  <div class="card">
    <div id="preview" style="width:100%;height:120px;border-radius:10px;margin-bottom:16px;transition:all 0.3s"></div>
    <div class="row">
      <div><label class="label">종류</label>
        <select id="type" onchange="update()">
          <option value="linear">선형 (Linear)</option>
          <option value="radial">방사형 (Radial)</option>
        </select>
      </div>
      <div><label class="label">각도 (선형)</label><input type="number" id="angle" value="135" oninput="update()"></div>
    </div>
    <div class="row">
      <div><label class="label">색상 1</label><input type="color" id="c1" value="#6c63ff" oninput="update()"></div>
      <div><label class="label">색상 2</label><input type="color" id="c2" value="#00d4aa" oninput="update()"></div>
      <div><label class="label">색상 3 (선택)</label><input type="color" id="c3" value="#ff6b6b" oninput="update()"></div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;cursor:pointer;margin-bottom:12px">
      <input type="checkbox" id="useC3" onchange="update()" style="width:auto;accent-color:var(--accent)"> 세 번째 색상 사용
    </label>
    <label class="label">CSS 코드</label>
    <div class="output" id="output" style="font-family:'Courier New',monospace"></div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">CSS 복사</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
function update(){
  const type=document.getElementById('type').value,angle=document.getElementById('angle').value;
  const c1=document.getElementById('c1').value,c2=document.getElementById('c2').value,c3=document.getElementById('c3').value;
  const use3=document.getElementById('useC3').checked;
  const colors=use3?`${c1}, ${c2}, ${c3}`:`${c1}, ${c2}`;
  const css=type==='linear'?`linear-gradient(${angle}deg, ${colors})`:`radial-gradient(circle, ${colors})`;
  document.getElementById('preview').style.background=css;
  document.getElementById('output').textContent=`background: ${css};`;
}
update();
</script>
</body></html>
