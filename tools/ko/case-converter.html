<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 영문 대소문자 변환기. 대문자, 소문자, 제목 형식, camelCase, snake_case로 즉시 변환하세요.">
  <title>대소문자 변환기 – 무료 온라인 텍스트 변환 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/case-converter.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">대소문자 변환기</h1>
  <p class="tool-desc">영문 텍스트를 대문자, 소문자, 제목 형식, camelCase, snake_case 등으로 즉시 변환합니다.</p>
  <div class="card">
    <label class="label">텍스트 입력</label>
    <textarea id="input" placeholder="변환할 텍스트를 입력하세요..."></textarea>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="convert('upper')">대문자</button>
      <button class="btn btn-secondary" onclick="convert('lower')">소문자</button>
      <button class="btn btn-secondary" onclick="convert('title')">제목 형식</button>
      <button class="btn btn-secondary" onclick="convert('sentence')">문장 형식</button>
      <button class="btn btn-secondary" onclick="convert('camel')">camelCase</button>
      <button class="btn btn-secondary" onclick="convert('snake')">snake_case</button>
      <button class="btn btn-secondary" onclick="convert('kebab')">kebab-case</button>
      <button class="btn btn-secondary" onclick="convert('pascal')">PascalCase</button>
    </div>
    <label class="label">결과</label>
    <div class="output" id="output">결과가 여기에 표시됩니다...</div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">결과 복사</button>
      <button class="btn btn-secondary" onclick="document.getElementById('input').value='';document.getElementById('output').textContent='결과가 여기에 표시됩니다...'">초기화</button>
    </div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
function convert(type) {
  const t = document.getElementById('input').value;
  let r = '';
  switch(type) {
    case 'upper': r = t.toUpperCase(); break;
    case 'lower': r = t.toLowerCase(); break;
    case 'title': r = t.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); break;
    case 'sentence': r = t.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g,c=>c.toUpperCase()); break;
    case 'camel': r = t.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase()); break;
    case 'snake': r = t.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''); break;
    case 'kebab': r = t.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); break;
    case 'pascal': r = t.toLowerCase().replace(/(^\w|[^a-zA-Z0-9]\w)/g,c=>c.replace(/[^a-zA-Z0-9]/g,'').toUpperCase()); break;
  }
  document.getElementById('output').textContent = r;
}
</script>
</body></html>
