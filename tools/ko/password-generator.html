<head>

  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 비밀번호 생성기. 안전하고 강력한 랜덤 비밀번호를 즉시 생성하세요. 회원가입 불필요.">
  <meta name="keywords" content="비밀번호 생성기, 랜덤 비밀번호, 강력한 비밀번호, 무료 비밀번호 만들기">
  <title>비밀번호 생성기 – 무료 강력한 비밀번호 만들기 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/password-generator.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">비밀번호 생성기</h1>
  <p class="tool-desc">암호학적으로 안전한 랜덤 비밀번호를 생성합니다. 길이와 문자 종류를 직접 설정하세요.</p>
  <div class="card">
    <label class="label">비밀번호 길이: <strong id="lenDisplay">16</strong>자리</label>
    <input type="range" id="pwLen" min="4" max="128" value="16" oninput="document.getElementById('lenDisplay').textContent=this.value;generate()" style="width:100%;accent-color:var(--accent);margin-bottom:16px">
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;font-size:0.9rem">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="upper" checked style="width:auto;accent-color:var(--accent)"> 대문자 (A–Z)</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="lower" checked style="width:auto;accent-color:var(--accent)"> 소문자 (a–z)</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="nums" checked style="width:auto;accent-color:var(--accent)"> 숫자 (0–9)</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="syms" checked style="width:auto;accent-color:var(--accent)"> 특수문자 (!@#$%^&*...)</label>
    </div>
    <div class="output" id="output" style="font-size:1.1rem;letter-spacing:1px;text-align:center">생성 버튼을 클릭하세요</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generate()">생성</button>
      <button class="btn btn-success" onclick="copyRaw(document.getElementById('output').textContent)">복사</button>
    </div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
function generate() {
  const len=parseInt(document.getElementById('pwLen').value);
  const pool=(document.getElementById('upper').checked?'ABCDEFGHIJKLMNOPQRSTUVWXYZ':'')+(document.getElementById('lower').checked?'abcdefghijklmnopqrstuvwxyz':'')+(document.getElementById('nums').checked?'0123456789':'')+(document.getElementById('syms').checked?'!@#$%^&*()_+-=[]{}|;:,.<>?':'');
  if(!pool){document.getElementById('output').textContent='최소 하나의 옵션을 선택하세요';return;}
  const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  document.getElementById('output').textContent=[...arr].map(n=>pool[n%pool.length]).join('');
}
generate();
</script>
</body></html>
