<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 나이 계산기. 생년월일을 입력하면 정확한 나이를 년, 월, 일 단위로 계산합니다.">
  <meta name="keywords" content="나이 계산기, 만나이 계산, 생년월일 나이, 무료 나이 계산">
  <title>나이 계산기 – 만나이 계산기 무료 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/age-calculator.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">나이 계산기</h1>
  <p class="tool-desc">생년월일을 입력하면 만 나이를 년, 월, 일, 총 일수로 정확하게 계산합니다.</p>
  <div class="card">
    <label class="label">생년월일</label>
    <input type="date" id="dob" onchange="calc()">
    <div id="result" style="margin-top:20px"></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
function calc(){
  const dob=new Date(document.getElementById('dob').value);
  if(isNaN(dob))return;
  const now=new Date();
  let y=now.getFullYear()-dob.getFullYear(),m=now.getMonth()-dob.getMonth(),d=now.getDate()-dob.getDate();
  if(d<0){m--;const prev=new Date(now.getFullYear(),now.getMonth(),0);d+=prev.getDate();}
  if(m<0){y--;m+=12;}
  const totalDays=Math.floor((now-dob)/86400000);
  const next=new Date(dob);next.setFullYear(now.getFullYear());if(next<now)next.setFullYear(now.getFullYear()+1);
  const daysToNext=Math.floor((next-now)/86400000);
  document.getElementById('result').innerHTML=`
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:3rem;font-weight:700;color:var(--accent)">${y}</div>
      <div style="color:var(--muted);font-size:0.9rem">만 나이</div>
    </div>
    <div class="stat-row">
      <div class="stat"><strong>${m}</strong>개월</div>
      <div class="stat"><strong>${d}</strong>일</div>
      <div class="stat"><strong>${totalDays.toLocaleString()}</strong>총 일수</div>
      <div class="stat"><strong>${daysToNext}</strong>생일까지</div>
    </div>`;
}
</script>
</body></html>
