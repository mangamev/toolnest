<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 QR 코드 생성기. URL이나 텍스트로 QR 코드를 즉시 만들고 PNG로 다운로드하세요.">
  <meta name="keywords" content="QR코드 생성기, QR 코드 만들기, 무료 QR코드, QR코드 다운로드">
  <title>QR 코드 생성기 – 무료 온라인 QR 만들기 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/qr-code.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">QR 코드 생성기</h1>
  <p class="tool-desc">URL이나 텍스트를 입력하면 QR 코드를 즉시 생성합니다. PNG 파일로 무료 다운로드 가능합니다.</p>
  <div class="card">
    <label class="label">URL 또는 텍스트 입력</label>
    <input type="text" id="input" placeholder="https://example.com" oninput="generate()">
    <div id="qrWrap" style="text-align:center;margin-top:20px;min-height:60px">
      <p style="color:var(--muted);font-size:0.85rem">위에 텍스트를 입력하면 QR 코드가 생성됩니다</p>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-success" onclick="download()">PNG 다운로드</button>
    </div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
let qr=null;
function generate(){
  const v=document.getElementById('input').value.trim();
  const wrap=document.getElementById('qrWrap');
  if(!v){wrap.innerHTML='<p style="color:var(--muted);font-size:0.85rem">위에 텍스트를 입력하면 QR 코드가 생성됩니다</p>';qr=null;return;}
  wrap.innerHTML='';
  qr=new QRCode(wrap,{text:v,width:200,height:200,colorDark:'#e8eaf0',colorLight:'#1f2330',correctLevel:QRCode.CorrectLevel.H});
}
function download(){
  const canvas=document.querySelector('#qrWrap canvas');
  if(!canvas){showToast('먼저 QR 코드를 생성하세요');return;}
  const a=document.createElement('a');a.download='qrcode.png';a.href=canvas.toDataURL();a.click();
}
</script>
</body></html>
