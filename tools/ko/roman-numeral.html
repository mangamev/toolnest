<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 로마 숫자 변환기. 아라비아 숫자를 로마 숫자로 변환하거나 로마 숫자를 아라비아 숫자로 변환하세요.">
  <title>로마 숫자 변환기 – 무료 온라인 도구 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/roman-numeral.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">로마 숫자 변환기</h1>
  <p class="tool-desc">아라비아 숫자를 로마 숫자로 변환하거나 로마 숫자를 아라비아 숫자로 변환합니다. (1~3999)</p>
  <div class="card">
    <label class="label">숫자 → 로마 숫자</label>
    <input type="number" id="numInput" placeholder="예: 2024" min="1" max="3999" oninput="toRoman()">
    <div class="output" id="romanOut" style="font-size:1.8rem;text-align:center;font-family:'Space Grotesk',sans-serif">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('romanOut').textContent)">복사</button></div>
    <label class="label" style="margin-top:20px">로마 숫자 → 숫자</label>
    <input type="text" id="romanInput" placeholder="예: MMXXIV" oninput="fromRoman()" style="font-family:'Courier New',monospace;text-transform:uppercase">
    <div class="output" id="numOut" style="font-size:1.8rem;text-align:center;font-family:'Space Grotesk',sans-serif">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('numOut').textContent)">복사</button></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
const vals=[[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
function toRoman(){let n=parseInt(document.getElementById('numInput').value);if(isNaN(n)||n<1||n>3999){document.getElementById('romanOut').textContent='1~3999 사이의 숫자만 가능합니다';return;}let r='';for(const[v,s]of vals){while(n>=v){r+=s;n-=v;}}document.getElementById('romanOut').textContent=r;}
function fromRoman(){const r=document.getElementById('romanInput').value.toUpperCase();const map={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};let n=0;for(let i=0;i<r.length;i++){const cur=map[r[i]],next=map[r[i+1]];if(cur===undefined){document.getElementById('numOut').textContent='잘못된 로마 숫자';return;}n+=next&&cur<next?-cur:cur;}document.getElementById('numOut').textContent=n||'—';}
</script>
</body></html>
