<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 정규식 테스터. 정규표현식을 실시간으로 테스트하고 매칭 결과를 확인하세요.">
  <meta name="keywords" content="정규식 테스터, 정규표현식 테스트, regex 테스트, 무료 정규식">
  <title>정규식 테스터 – 정규표현식 온라인 테스트 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
  <style>.match{background:#6c63ff44;border-bottom:2px solid var(--accent);border-radius:2px;}</style>
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/regex-tester.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">정규식 테스터</h1>
  <p class="tool-desc">정규표현식을 입력하고 실시간으로 매칭 결과를 확인하세요.</p>
  <div class="card">
    <label class="label">정규표현식</label>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="color:var(--muted);font-size:1.2rem">/</span>
      <input type="text" id="pattern" placeholder="예: \d+" oninput="test()" style="font-family:'Courier New',monospace">
      <span style="color:var(--muted);font-size:1.2rem">/</span>
      <input type="text" id="flags" placeholder="gi" value="g" oninput="test()" style="width:60px;font-family:'Courier New',monospace">
    </div>
    <label class="label">테스트 문자열</label>
    <textarea id="input" placeholder="테스트할 텍스트를 입력하세요..." oninput="test()"></textarea>
    <div class="output" id="info" style="margin-top:8px">패턴을 입력하면 매칭을 시작합니다</div>
    <label class="label">매칭 결과 강조</label>
    <div id="highlighted" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:48px;font-family:'Courier New',monospace;font-size:0.88rem;line-height:1.8;word-break:break-all"></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
function test(){
  const p=document.getElementById('pattern').value,f=document.getElementById('flags').value,t=document.getElementById('input').value;
  if(!p){document.getElementById('info').textContent='패턴을 입력하세요';document.getElementById('highlighted').textContent=t;return;}
  try{
    const re=new RegExp(p,f);
    const matches=[...t.matchAll(new RegExp(p,f.includes('g')?f:f+'g'))];
    document.getElementById('info').textContent=`${matches.length}개 매칭됨`;
    document.getElementById('highlighted').innerHTML=t.replace(re,m=>`<span class="match">${m}</span>`);
  }catch(e){document.getElementById('info').textContent='잘못된 정규식: '+e.message;document.getElementById('highlighted').textContent=t;}
}
</script>
</body></html>
