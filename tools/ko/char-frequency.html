<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="무료 문자 빈도 분석기. 텍스트에서 각 문자가 몇 번 나타나는지 분석합니다.">
  <title>문자 빈도 분석기 – 텍스트 분석 도구 | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
  <style>
    .freq-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:0.85rem;}
    .freq-table th{text-align:left;padding:8px 12px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:500;}
    .freq-table td{padding:8px 12px;border-bottom:1px solid var(--border);}
    .bar{height:8px;background:var(--accent);border-radius:4px;min-width:2px;}
  </style>
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/tools/ko/">← 전체 도구</a><a href="/tools/char-frequency.html">English</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">문자 빈도 분석기</h1>
  <p class="tool-desc">텍스트에서 각 문자가 몇 번 나타나는지 분석합니다. 암호 분석이나 텍스트 연구에 유용합니다.</p>
  <div class="card">
    <label class="label">분석할 텍스트</label>
    <textarea id="input" placeholder="분석할 텍스트를 입력하세요..." oninput="analyze()"></textarea>
    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;cursor:pointer;margin-top:10px">
      <input type="checkbox" id="ignoreSpace" checked onchange="analyze()" style="width:auto;accent-color:var(--accent)"> 공백 무시
    </label>
    <div id="result"></div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">개인정보처리방침</a> · <a href="/terms.html">이용약관</a></p></footer>
<div id="toast">복사됨!</div>
<script src="/tools/common.js"></script>
<script>
function analyze(){
  let t=document.getElementById('input').value;
  if(document.getElementById('ignoreSpace').checked)t=t.replace(/\s/g,'');
  if(!t){document.getElementById('result').innerHTML='';return;}
  const freq={};for(const c of t)freq[c]=(freq[c]||0)+1;
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  document.getElementById('result').innerHTML=`<table class="freq-table"><thead><tr><th>문자</th><th>횟수</th><th>비율</th><th style="width:40%">빈도</th></tr></thead><tbody>${sorted.map(([c,n])=>`<tr><td style="font-family:'Courier New',monospace;font-weight:600">${c===' '?'[공백]':c}</td><td>${n}</td><td>${(n/t.length*100).toFixed(1)}%</td><td><div class="bar" style="width:${n/max*100}%"></div></td></tr>`).join('')}</tbody></table>`;
}
</script>
</body></html>
