<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5J4F47ZVP3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5J4F47ZVP3');</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free Unix timestamp converter. Convert Unix epoch timestamps to human-readable dates and vice versa.">
  <title>Unix Timestamp Converter – Epoch to Date | QuickFreeTools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/common.css">
</head>
<body>
<header><a class="logo" href="/">Quick<span>FreeTools</span></a><nav class="nav-links"><a href="/">← All Tools</a></nav></header>
<div class="tool-container">
  <h1 class="tool-title">Unix Timestamp Converter</h1>
  <p class="tool-desc">Convert Unix epoch timestamps to human-readable dates and times, or convert dates back to timestamps.</p>
  <div class="card">
    <label class="label">Current Unix Timestamp</label>
    <div class="output" id="current" style="font-size:1.4rem;text-align:center;font-family:'Space Grotesk',sans-serif">—</div>
    <div class="btn-row"><button class="btn btn-success" onclick="copyRaw(document.getElementById('current').textContent)">Copy</button></div>
    <label class="label" style="margin-top:20px">Timestamp → Human Date</label>
    <input type="number" id="tsInput" placeholder="e.g. 1700000000">
    <div class="btn-row"><button class="btn btn-primary" onclick="tsToDate()">Convert</button></div>
    <div class="output" id="tsOutput">—</div>
    <label class="label" style="margin-top:20px">Date → Timestamp</label>
    <input type="text" id="dateInput" placeholder="e.g. 2024-01-15 12:00:00">
    <div class="btn-row"><button class="btn btn-primary" onclick="dateToTs()">Convert</button></div>
    <div class="output" id="dateOutput">—</div>
  </div>
</div>
<footer><p>© 2025 QuickFreeTools · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p></footer>
<div id="toast">Copied!</div>
<script src="/tools/common.js"></script>
<script>
function updateCurrent(){document.getElementById('current').textContent=Math.floor(Date.now()/1000);}
updateCurrent(); setInterval(updateCurrent,1000);
function tsToDate(){const ts=parseInt(document.getElementById('tsInput').value);if(isNaN(ts)){document.getElementById('tsOutput').textContent='Invalid timestamp';return;}const d=new Date(ts*1000);document.getElementById('tsOutput').textContent=d.toUTCString()+'\nLocal: '+d.toLocaleString();}
function dateToTs(){const d=new Date(document.getElementById('dateInput').value);if(isNaN(d)){document.getElementById('dateOutput').textContent='Invalid date';return;}document.getElementById('dateOutput').textContent=Math.floor(d.getTime()/1000);}
</script>
</body></html>
